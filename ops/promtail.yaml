# Promtail config example for shipping ulw-system stdout to Loki.
# Adjust `clients.url`, `positions.filename`, and `__path__` for your host.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ulw-system
    static_configs:
      - targets: [localhost]
        labels:
          job: ulw-system
          service: ulw-system
          __path__: /var/log/ulw/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            requestId: requestId
            tenant: tenantId
            route: route
            status: status
      - labels:
          level:
          route:
          status:
      - timestamp:
          source: time
          format: RFC3339Nano
