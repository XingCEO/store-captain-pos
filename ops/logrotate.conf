# logrotate example for ulw-system pino stdout redirected to /var/log/ulw/.
# Activate by symlinking into /etc/logrotate.d/.

/var/log/ulw/ulw-system.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 ulw ulw
    postrotate
        # Pino reopens on SIGUSR2 if you wire it up; otherwise restart server.
        systemctl kill -s USR2 ulw-system.service > /dev/null 2>&1 || true
    endscript
}

/var/log/ulw/syncWorker.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 ulw ulw
}
