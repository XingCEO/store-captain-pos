<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'">
  <title>店家訂單</title>
  <meta name="theme-color" content="#0f1419">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f1419'/%3E%3Cpath d='M16 22h32v22H16z' fill='%23f4c47b'/%3E%3Cpath d='M22 28h12v3H22zm0 7h20v3H22z' fill='%230f1419'/%3E%3Ccircle cx='48' cy='18' r='6' fill='%230f8a6a'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&family=Noto+Serif+TC:wght@800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;
      font-family:"Inter","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
      background:
        radial-gradient(60% 50% at 20% 0%, rgba(15,138,106,.12), transparent 60%),
        radial-gradient(50% 40% at 100% 30%, rgba(217,119,6,.1), transparent 60%),
        linear-gradient(180deg,#f7f5ee 0%,#efece1 100%);
      color:#0f1419;
      display:grid;place-items:center;padding:1.5rem;
    }
    .wrap{max-width:32rem;width:100%;display:grid;gap:1rem}
    .card{
      padding:1.6rem 1.6rem 1.8rem;border-radius:1.4rem;
      background:#fffdf6;border:1px solid rgba(15,20,25,.08);
      box-shadow:0 24px 60px -22px rgba(15,20,25,.22);
    }
    .brand{display:flex;gap:.7rem;align-items:center;margin-bottom:1.2rem}
    .brand-mark{display:grid;place-items:center;width:2.6rem;height:2.6rem;border-radius:.8rem;background:#0f1419}
    .brand strong{font-family:"Noto Serif TC",serif;font-weight:900;letter-spacing:-.02em;font-size:1.05rem}
    .brand em{display:block;font-style:normal;color:#5b6470;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
    .tag{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .65rem;border-radius:999px;background:#d3eee0;color:#0a5e48;font-size:.72rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
    .tag::before{content:"";width:.5rem;height:.5rem;border-radius:50%;background:#0f8a6a;box-shadow:0 0 0 4px rgba(15,138,106,.16)}
    h1{margin:.8rem 0 .4rem;font-family:"Noto Serif TC",serif;font-size:1.6rem;font-weight:900;letter-spacing:-.02em;line-height:1.2}
    p.lead{margin:0 0 1.1rem;color:#3a4250;font-size:.95rem;line-height:1.65}
    .row{display:flex;justify-content:space-between;align-items:baseline;padding:.7rem 0;border-bottom:1px dashed rgba(15,20,25,.12)}
    .row:last-child{border-bottom:0}
    .row span{color:#5b6470;font-size:.86rem;font-weight:700}
    .row b{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:.95rem}
    .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:.6rem;padding-top:.9rem;border-top:2px dashed rgba(15,20,25,.16)}
    .total span{color:#5b6470;font-size:.86rem;font-weight:800}
    .total strong{font-family:"Noto Serif TC",serif;font-size:2.2rem;font-weight:900;letter-spacing:-.03em;line-height:1}
    .total strong span{font-size:.95rem;color:#5b6470;margin-right:.2rem;font-weight:700}
    .actions{display:grid;gap:.55rem;margin-top:1.2rem}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.45rem;
      padding:.85rem 1.1rem;border-radius:.75rem;border:0;
      background:#0f1419;color:#fffdf6;font-weight:800;font-size:.95rem;
      cursor:pointer;text-decoration:none;
      box-shadow:0 14px 28px -12px rgba(15,20,25,.55), inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .18s ease, background .18s ease;
    }
    .btn:hover{transform:translateY(-1px);background:#1f2730}
    .btn.ghost{background:#fffdf6;color:#0f1419;border:1px solid rgba(15,20,25,.14);box-shadow:none}
    .btn.ghost:hover{border-color:#0f1419;background:#efece1}
    .note{margin:1rem 0 0;padding:.8rem 1rem;border-radius:.7rem;background:rgba(244,196,123,.22);border:1px dashed rgba(217,119,6,.4);color:#7a3210;font-size:.82rem;line-height:1.6;font-weight:600}
    .footer{text-align:center;color:#5b6470;font-size:.78rem}
    .footer a{color:#0a5e48;font-weight:800;text-decoration:none}
    .footer a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" id="orderCard">
      <header class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="32" height="32" viewBox="0 0 36 36"><rect x="3" y="8" width="30" height="22" rx="5" fill="#f4c47b"/><rect x="8" y="13" width="20" height="12" rx="2" fill="#0f1419"/><rect x="10" y="16" width="9" height="2" rx="1" fill="#f4c47b"/><rect x="10" y="20" width="14" height="2" rx="1" fill="#f4c47b"/><circle cx="29" cy="11" r="4" fill="#0f8a6a"/></svg>
        </span>
        <div><strong id="storeName">店家</strong><em>Store Captain · Order</em></div>
      </header>
      <span class="tag">已收到訂單</span>
      <h1 id="orderTitle">訂單已建立</h1>
      <p class="lead" id="orderLead">店家已收到您的訂單，正在準備中。請於到店時出示此頁面或單號。</p>
      <div class="row"><span>訂單編號</span><b id="orderId">—</b></div>
      <div class="row"><span>來源</span><b id="orderSource">QR</b></div>
      <div class="row"><span>門市</span><b id="orderStore">—</b></div>
      <div class="row"><span>建立時間</span><b id="orderTime">—</b></div>
      <div class="total"><span>應付金額</span><strong><span>NT$</span><b id="orderTotal">0</b></strong></div>
      <div class="actions">
        <a class="btn" href="javascript:window.print()">列印訂單明細</a>
        <a class="btn ghost" href="/">回到首頁</a>
      </div>
      <p class="note">本頁顯示由 QR / LINE 點餐連結帶入的訂單資訊。實際付款、發票、出單由店家收銀台確認，所有變動會在後台留下稽核紀錄。</p>
    </section>
    <p class="footer">由 <a href="/">店長 AI POS</a> 提供 · 客服請聯絡店家</p>
  </main>

  <script>
    (function () {
      function readParams() {
        var raw = location.hash ? location.hash.slice(1) : location.search.slice(1);
        var out = {};
        if (!raw) return out;
        raw.split('&').forEach(function (pair) {
          var idx = pair.indexOf('=');
          if (idx < 0) return;
          out[decodeURIComponent(pair.slice(0, idx))] = decodeURIComponent(pair.slice(idx + 1));
        });
        return out;
      }
      function fmt(num) {
        var n = Number(num || 0);
        return n.toLocaleString('zh-TW');
      }
      function set(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
      }
      var p = readParams();
      if (p.id) set('orderId', p.id);
      if (p.source) set('orderSource', p.source.toUpperCase());
      if (p.store) set('orderStore', p.store);
      set('orderTotal', fmt(p.total));
      var t = p.t ? new Date(Number(p.t)) : new Date();
      set('orderTime', isNaN(t.getTime()) ? '—' : t.toLocaleString('zh-TW'));
      if (p.storeName) set('storeName', p.storeName);
      if (!p.id) {
        set('orderTitle', '請從 QR 連結進入');
        set('orderLead', '此頁面需要由店家 POS 產生的 QR / LINE 點餐連結進入。');
      }
    })();
  </script>
</body>
</html>
